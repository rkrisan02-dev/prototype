<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PicknPack.ai — IMS / WMS Prototype</title>
<style>
:root{
  --bg:#f4f6f9; --panel:#ffffff; --ink:#17202b; --muted:#68778a; --line:#e3e8ee;
  --brand:#0d7a5f; --brand2:#0fa878; --brand-soft:#e2f4ee;
  --side:#122436; --side-ink:#b9c7d4; --side-active:#0fa878;
  --amber:#b45309; --amber-soft:#fef3c7; --red:#b91c1c; --red-soft:#fee2e2;
  --blue:#1d4ed8; --blue-soft:#dbeafe; --green:#15803d; --green-soft:#dcfce7;
  --purple:#7e22ce; --purple-soft:#f3e8ff; --gray-soft:#eef1f5;
  --radius:10px; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.45 "Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);display:flex;height:100vh;overflow:hidden}
/* ---------- sidebar ---------- */
#sidebar{width:232px;background:var(--side);color:var(--side-ink);display:flex;flex-direction:column;flex-shrink:0}
#logo{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
#logo .name{font-size:18px;font-weight:700;color:#fff}
#logo .name span{color:var(--side-active)}
#logo .sub{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:#7b8fa2;margin-top:2px}
#nav{flex:1;overflow-y:auto;padding:8px 0 20px}
#nav::-webkit-scrollbar{width:5px}#nav::-webkit-scrollbar-thumb{background:#2c4258;border-radius:3px}
.nav-group{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#617a90;padding:14px 18px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 18px;cursor:pointer;font-size:13px;border-left:3px solid transparent;white-space:nowrap}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(15,168,120,.13);border-left-color:var(--side-active);color:#fff}
.nav-item .ic{width:17px;text-align:center;opacity:.85;font-size:13px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:1px 6px}
/* ---------- topbar ---------- */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:54px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 18px;flex-shrink:0}
#crumb{font-weight:600;font-size:15px}
#globalscan{margin-left:auto;display:flex;align-items:center;gap:8px}
#globalscan input{width:230px;padding:7px 10px 7px 30px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;background:#fafbfc url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%2368778a" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 8v8M11 8v8M15 8v8"/></svg>') 9px center no-repeat}
#globalscan input:focus{outline:none;border-color:var(--brand2)}
.pillsel{display:flex;align-items:center;gap:6px;background:var(--gray-soft);border-radius:8px;padding:4px 8px;font-size:12.5px}
.pillsel select{border:none;background:transparent;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer}
.pillsel select:focus{outline:none}
.pillsel .lbl{color:var(--muted);font-size:11px}
/* ---------- content ---------- */
#content{flex:1;overflow-y:auto;padding:20px 22px 60px}
.page-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.page-head h1{font-size:19px;font-weight:700}
.page-head .desc{color:var(--muted);font-size:12.5px;width:100%}
.spacer{flex:1}
/* cards / kpi */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px;box-shadow:var(--shadow)}
.kpi .v{font-size:22px;font-weight:700}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px}
.kpi.warn .v{color:var(--amber)} .kpi.bad .v{color:var(--red)} .kpi.good .v{color:var(--green)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px}
.card-h{padding:12px 16px;border-bottom:1px solid var(--line);font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:8px}
.card-b{padding:14px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:1100px){.grid2,.grid3{grid-template-columns:1fr}}
/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);text-align:left;padding:9px 12px;border-bottom:1px solid var(--line);background:#fafbfc;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #eef1f4;vertical-align:middle}
tr:hover td{background:#f8fafc}
tr.clickable{cursor:pointer}
td .sub{font-size:11px;color:var(--muted)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.empty{padding:26px;text-align:center;color:var(--muted);font-size:13px}
/* badges */
.b{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b.gray{background:var(--gray-soft);color:#475467}.b.green{background:var(--green-soft);color:var(--green)}
.b.amber{background:var(--amber-soft);color:var(--amber)}.b.red{background:var(--red-soft);color:var(--red)}
.b.blue{background:var(--blue-soft);color:var(--blue)}.b.purple{background:var(--purple-soft);color:var(--purple)}
.b.teal{background:var(--brand-soft);color:var(--brand)}
/* buttons & forms */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink)}
.btn:hover{background:#f4f6f8}
.btn.p{background:var(--brand);border-color:var(--brand);color:#fff}.btn.p:hover{background:#0a6b53}
.btn.danger{color:var(--red);border-color:#f3c6c6}.btn.danger:hover{background:var(--red-soft)}
.btn.sm{padding:4px 10px;font-size:11.5px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input[type=text],input[type=number],input[type=date],input[type=email],select,textarea{padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand2)}
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:10px}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.filters input,.filters select{width:auto;min-width:140px}
/* modal */
#modal-bg{position:fixed;inset:0;background:rgba(13,25,38,.5);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto}
#modal-bg.open{display:flex}
#modal{background:#fff;border-radius:14px;width:100%;max-width:680px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
#modal.wide{max-width:900px}
#modal-h{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;font-weight:700;font-size:15px}
#modal-h .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:20px;line-height:1}
#modal-b{padding:18px 20px;max-height:65vh;overflow-y:auto}
#modal-f{padding:13px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
/* toast */
#toasts{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:#17202b;color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.3);max-width:360px;animation:tin .2s ease}
.toast.ok{border-left:4px solid var(--brand2)} .toast.err{border-left:4px solid #ef4444}
@keyframes tin{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
/* barcode */
.barcode{display:inline-block;text-align:center;padding:8px 10px 4px;background:#fff;border:1px solid var(--line);border-radius:6px}
.barcode .bars{height:38px;width:150px;background:repeating-linear-gradient(90deg,#000 0 2px,#fff 2px 4px,#000 4px 7px,#fff 7px 8px,#000 8px 9px,#fff 9px 12px);margin-bottom:3px}
.barcode .bc-txt{font-family:Consolas,monospace;font-size:11px;letter-spacing:1px}
/* scan station */
.scanbox{border:2px dashed var(--brand2);border-radius:12px;padding:14px;background:var(--brand-soft)}
.scanbox input{font-size:16px;font-family:Consolas,monospace;padding:10px 12px}
.scan-log{font-family:Consolas,monospace;font-size:12px;background:#0f1c29;color:#8fd6bb;border-radius:8px;padding:10px 12px;max-height:150px;overflow-y:auto;margin-top:10px}
.scan-log .bad{color:#ff9d9d}
/* checklist */
.chk-item{display:flex;align-items:flex-start;gap:10px;padding:9px 4px;border-bottom:1px solid #eef1f4}
.chk-item input[type=checkbox]{width:17px;height:17px;margin-top:2px;accent-color:var(--brand);cursor:pointer}
.chk-item .who{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap}
.chk-item.done .txt{text-decoration:line-through;color:var(--muted)}
/* misc */
.progress{height:7px;background:var(--gray-soft);border-radius:4px;overflow:hidden;min-width:70px}
.progress i{display:block;height:100%;background:var(--brand2)}
.tag{font-size:10.5px;background:var(--gray-soft);border-radius:5px;padding:1px 6px;color:var(--muted)}
.linklike{color:var(--brand);cursor:pointer;font-weight:600;text-decoration:none}
.flow{display:flex;gap:0;flex-wrap:wrap;align-items:center;margin:8px 0}
.flow .step{background:var(--panel);border:1.5px solid var(--line);border-radius:9px;padding:8px 13px;font-size:12px;font-weight:600;text-align:center}
.flow .step .s2{display:block;font-weight:400;font-size:10.5px;color:var(--muted)}
.flow .arr{padding:0 7px;color:var(--muted);font-size:15px}
.flow .step.hl{border-color:var(--brand2);background:var(--brand-soft)}
.mono{font-family:Consolas,monospace;font-size:12px}
.avatar{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.arch pre{background:#0f1c29;color:#c9d8e4;padding:16px;border-radius:10px;overflow-x:auto;font-size:12px;line-height:1.5;font-family:Consolas,monospace}
.notice{background:var(--amber-soft);border:1px solid #f5deae;border-radius:9px;padding:10px 14px;font-size:12.5px;color:#7c4a03;margin-bottom:14px}
.split{display:flex;gap:16px;align-items:flex-start}.split>*{flex:1}

/* tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;cursor:pointer;font-weight:600;font-size:13px;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}
/* icon kpis */
.kpi{display:flex;gap:12px;align-items:center;cursor:default}
.kpi .ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.kpi.click{cursor:pointer}.kpi.click:hover{border-color:var(--brand2)}
.kpi.sel{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
/* stepper */
.stepper{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow);overflow-x:auto}
.stepper .st{display:flex;gap:10px;align-items:center;white-space:nowrap}
.stepper .n{width:30px;height:30px;border-radius:50%;background:var(--gray-soft);color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.stepper .st.done .n{background:var(--brand);color:#fff}
.stepper .st.cur .n{background:var(--blue);color:#fff;box-shadow:0 0 0 4px var(--blue-soft)}
.stepper .lab b{display:block;font-size:12.5px}.stepper .lab span{font-size:10.5px;color:var(--muted)}
.stepper .sbar{height:2px;background:var(--line);flex:1;margin:0 14px;min-width:24px}
/* donut */
.donut{width:118px;height:118px;border-radius:50%;position:relative;flex-shrink:0}
.donut::after{content:'';position:absolute;inset:15px;background:var(--panel);border-radius:50%}
.donut .c{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1}
/* split layout */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:16px;align-items:start}
@media(max-width:1100px){.layout{grid-template-columns:1fr}}
/* order list cards */
.ocard{border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:9px;cursor:pointer;background:var(--panel)}
.ocard:hover{border-color:var(--brand2)}
.ocard.sel{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
.ocard .r1{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
.ocard .r2{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);margin-top:3px}
/* vertical timeline */
.vt{list-style:none;margin:4px 0}
.vt li{position:relative;padding:0 0 15px 24px;font-size:12.5px;color:var(--muted)}
.vt li.on{color:var(--ink);font-weight:600}
.vt li::before{content:'';position:absolute;left:4px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--line)}
.vt li.on::before{background:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.vt li::after{content:'';position:absolute;left:8px;top:15px;bottom:0;width:1.5px;background:var(--line)}
.vt li:last-child::after{display:none}
.vt .when{display:block;font-size:10.5px;font-weight:400;color:var(--muted)}
/* current pick panel */
.bigloc{font-size:26px;font-weight:800;color:var(--blue);letter-spacing:.5px}
.qact{display:block;width:100%;text-align:left;margin-bottom:7px}
.copyb{cursor:pointer;color:var(--muted);font-size:12px;margin-left:4px}
.copyb:hover{color:var(--brand)}
</style>
</head>
<body>
<div id="sidebar">
  <div id="logo"><div class="name">Pickn<span>Pack</span>.ai</div><div class="sub">IMS · WMS · Manufacturing</div></div>
  <div id="nav"></div>
</div>
<div id="main">
  <div id="topbar">
    <div id="crumb">Dashboard</div>
    <div id="globalscan"><input id="gscan" type="text" placeholder="Scan any barcode (order / SKU / lot / bin)…" onkeydown="if(event.key==='Enter')globalScan(this)"></div>
    <div class="pillsel"><span class="lbl">Brand</span><select id="brandsel" onchange="setBrand(this.value)"></select></div>
    <div class="pillsel"><span class="lbl">User</span><select id="usersel" onchange="setUser(this.value)"></select></div>
  </div>
  <div id="content"></div>
</div>
<div id="modal-bg" onclick="if(event.target===this)closeModal()"><div id="modal"><div id="modal-h"><span id="modal-t"></span><span class="x" onclick="closeModal()">×</span></div><div id="modal-b"></div><div id="modal-f"></div></div></div>
<div id="toasts"></div>
<script>
/* ================= UTIL ================= */
const $=s=>document.querySelector(s);
const fmt$=n=>'$'+(+n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const todayISO=()=>new Date().toISOString().slice(0,10);
const nowTs=()=>new Date().toISOString();
const dstr=iso=>iso?new Date(iso+(iso.length===10?'T12:00':'')).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'—';
const tstr=iso=>iso?new Date(iso).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'—';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let _id=1000; const uid=p=>(p||'ID')+'-'+(++_id);
const daysAgo=n=>{const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10)};
function toast(msg,kind){const t=document.createElement('div');t.className='toast '+(kind||'ok');t.textContent=msg;$('#toasts').appendChild(t);setTimeout(()=>t.remove(),3800)}
function badge(txt,color){return '<span class="b '+color+'">'+esc(txt)+'</span>'}
const STATUS_COLOR={'Draft':'gray','Sent':'blue','Partially Received':'amber','Received':'green','Closed':'gray','Open':'blue','In Production':'amber','Complete':'green','Paused':'red','New':'blue','On Hold - Stock':'red','Allocated':'teal','Picking':'amber','Picked':'purple','Packed':'purple','Shipped':'green','Delivered':'green','In Transit':'blue','Label Created':'gray','Exception':'red','Cancelled':'gray','Pending Approval':'amber','Approved':'green','Rejected':'red','Active':'green','Inactive':'gray','Paid':'green','Unpaid':'amber','Partial':'amber','Overdue':'red','Planned':'gray','Released':'blue','WIP':'amber','Done':'green','Voided':'gray','Low Stock':'red','OK':'green','Due':'amber','Connected':'green','Pending Setup':'amber','Testing':'blue','Processing':'amber'};
function sbadge(s){return badge(s,STATUS_COLOR[s]||'gray')}
function barcode(code){return '<div class="barcode"><div class="bars"></div><div class="bc-txt">'+esc(code)+'</div></div>'}
function progress(p){return '<div class="progress"><i style="width:'+Math.min(100,Math.round(p))+'%"></i></div>'}

/* ================= DATA STORE ================= */
const seed=()=>({

 {id:'BIN4',wh:'W1',code:'A1-03',zone:'Pick'},{id:'BIN5',wh:'W1',code:'B1-01',zone:'Bulk'},{id:'BIN6',wh:'W1',code:'B1-02',zone:'Bulk'},
 {id:'BIN7',wh:'W1',code:'RM-01',zone:'Raw Materials'},{id:'BIN8',wh:'W1',code:'PM-01',zone:'Packaging'},{id:'BIN9',wh:'W1',code:'PACK-01',zone:'Pack Station'},
 {id:'BIN10',wh:'W1',code:'SHIP-DOCK',zone:'Shipping'},{id:'BIN11',wh:'W1',code:'QC-HOLD',zone:'QC'},{id:'BIN12',wh:'W1',code:'PROD-01',zone:'Production'},
 {id:'BIN13',wh:'W2',code:'DOT-MAIN',zone:'External'},{id:'BIN14',wh:'W3',code:'KEHE-MAIN',zone:'External'},{id:'BIN15',wh:'W4',code:'CS-MAIN',zone:'External'}],
items:[
 // Finished goods (brand B1)

 {id:'I2',sku:'BTP4x10',name:'Bourbon Toffee Pecans 4oz',type:'FG',brand:'B1',caseQty:10,uom:'Case',price:36.0,cost:16.5,reorder:50,upc:'850012345028'},

 {id:'I7',sku:'CDM2.8x6',name:'Citrus Splash Dried Mangoes 2.8oz',type:'FG',brand:'B1',caseQty:6,uom:'Case',price:24.0,cost:12.1,reorder:80,upc:'850012345073'},

/* ================= INVENTORY ENGINE ================= */
function onHand(itemId){return db.inv.filter(r=>r.item===itemId).reduce((s,r)=>s+r.qty,0)}
function allocated(itemId){return db.inv.filter(r=>r.item===itemId).reduce((s,r)=>s+r.alloc,0)}
function available(itemId){return onHand(itemId)-allocated(itemId)}
function invRows(itemId){return db.inv.filter(r=>r.item===itemId&&r.qty>0)}
function post(type,itemId,lotId,binId,qty,ref,note){db.ledger.unshift({ts:nowTs(),type,item:itemId,lot:lotId,bin:binId,qty,ref:ref||'',note:note||'',user:curUser?curUser.id:'U1'})}
function addStock(itemId,lotId,binId,qty,type,ref,note){
  let r=db.inv.find(x=>x.item===itemId&&x.lot===lotId&&x.bin===binId);
  if(!r){r={item:itemId,lot:lotId,bin:binId,qty:0,alloc:0};db.inv.push(r)}
  r.qty+=qty; post(type,itemId,lotId,binId,qty,ref,note);
}
function removeStock(itemId,lotId,binId,qty,type,ref,note){
  const r=db.inv.find(x=>x.item===itemId&&x.lot===lotId&&x.bin===binId);
  if(!r||r.qty<qty)return false;
  r.qty-=qty; if(r.alloc>r.qty)r.alloc=r.qty; post(type,itemId,lotId,binId,-qty,ref,note); return true;
}
// FEFO allocation: earliest best-by first, pick zone preferred
function allocate(itemId,qty,ref){
  const rows=invRows(itemId).filter(r=>bin(r.bin).zone!=='QC'&&wh(db.bins.find(b=>b.id===r.bin).wh).type==='internal')
    .sort((a,b)=>(lot(a.lot).bestBy||'9999')<(lot(b.lot).bestBy||'9999')?-1:1);
  let need=qty;const allocs=[];
  for(const r of rows){const free=r.qty-r.alloc;if(free<=0)continue;const take=Math.min(free,need);r.alloc+=take;allocs.push({item:itemId,lot:r.lot,bin:r.bin,qty:take});need-=take;if(!need)break}
  if(need>0){allocs.forEach(a=>{const r=db.inv.find(x=>x.item===a.item&&x.lot===a.lot&&x.bin===a.bin);r.alloc-=a.qty});return null}
  post('ALLOCATE',itemId,null,null,qty,ref,'Inventory held for order');
  return allocs;
}
function deallocate(allocs,ref){(allocs||[]).forEach(a=>{const r=db.inv.find(x=>x.item===a.item&&x.lot===a.lot&&x.bin===a.bin);if(r)r.alloc=Math.max(0,r.alloc-a.qty)})}

function donut(segs,total,label){
  let acc=0;const tot=Math.max(1,total);
  const stops=segs.filter(s=>s.v>0).map(s=>{const a=acc/tot*360;acc+=s.v;return s.c+' '+a+'deg '+(acc/tot*360)+'deg'}).join(',');
  return '<div style="display:flex;gap:18px;align-items:center;flex-wrap:wrap"><div class="donut" style="background:conic-gradient('+(stops||'#e3e8ee 0deg 360deg')+')"><div class="c"><b style="font-size:19px">'+total+'</b><span class="sub">'+label+'</span></div></div><div style="min-width:150px">'+
  segs.map(s=>'<div style="display:flex;align-items:center;gap:7px;font-size:12px;margin:3.5px 0"><span style="width:10px;height:10px;border-radius:3px;background:'+s.c+';flex-shrink:0"></span>'+s.l+'<b style="margin-left:auto;padding-left:14px">'+s.v+'</b></div>').join('')+'</div></div>'}
function fulfillPct(o){
  if(o.status==='Shipped')return 100;
  if(o.status==='Picking'){const pl=db.picklists.find(p=>p.orders.includes(o.id));
    if(pl){const mine=pl.lines.filter(l=>l.orderId===o.id);const d=mine.filter(l=>l.picked).length;return 15+Math.round(45*d/Math.max(1,mine.length))}return 30}
  return {'New':0,'On Hold - Stock':0,'Allocated':15,'Picked':60,'Packed':80,'Cancelled':0}[o.status]??0}

function globalScan(inp){
  const code=inp.value.trim();if(!code)return;inp.value='';
  const it=db.items.find(i=>i.sku.toLowerCase()===code.toLowerCase()||i.upc===code);
  if(it){go('lots');setTimeout(()=>{const f=$('#lotsearch');if(f){f.value=it.sku;lotSearchRun()}},50);return}
  const lo=db.lots.find(l=>('LOT-'+l.lot).toLowerCase()===code.toLowerCase()||l.lot.toLowerCase()===code.toLowerCase());
  if(lo){go('lots');setTimeout(()=>{const f=$('#lotsearch');if(f){f.value=lo.lot;lotSearchRun()}},50);return}
  const b=db.bins.find(x=>x.code.toLowerCase()===code.toLowerCase()||('LOC-'+x.code).toLowerCase()===code.toLowerCase());
  if(b){go('lots');setTimeout(()=>{const f=$('#lotsearch');if(f){f.value=b.code;lotSearchRun()}},50);return}
  const o=db.orders.find(x=>x.no.toLowerCase()===code.toLowerCase()||(x.tracking||'')===code);
  if(o){openOrder(o.id);return}
  toast('No match for "'+code+'"','err');
}

function shipmentOf(o){return db.shipments.find(s=>s.order===o.id&&s.label!=='Voided')}
function orderTimeline(o){
  const steps=['Received','Allocated','Picked','Packed','Shipped','Delivered'];
  const map={'New':0,'On Hold - Stock':0,'Allocated':1,'Picking':1,'Picked':2,'Packed':3,'Shipped':4};
  let cur=map[o.status]??0;
  const shp=shipmentOf(o);
  if(o.status==='Shipped'&&shp&&shp.status==='Delivered')cur=5;
  if(o.status==='Cancelled')return '<div class="notice">Order cancelled.</div>';
  return '<div class="flow">'+steps.map((s,i)=>'<div class="step'+(i<=cur?' hl':'')+'">'+(i<cur?'✓ ':i===cur?'● ':'')+s+
   (i===1&&o.status==='Picking'?'<span class="s2">picking now…</span>':'')+
   (i===4&&shp&&i===cur?'<span class="s2">'+shp.carrier+' '+shp.status.toLowerCase()+'</span>':'')+
   '</div>'+(i<5?'<span class="arr">→</span>':'')).join('')+'</div>';

function allocOrder(id){const o=db.orders.find(x=>x.id===id);
  const shorts=[];
  o.lines.forEach(l=>{if(available(l.item)<l.qty)shorts.push(item(l.item).sku+' (short '+(l.qty-available(l.item))+')')});
  if(shorts.length){o.status='On Hold - Stock';o.holdReason='Insufficient stock: '+shorts.join(', ')+'. Suggest Build/PO.';toast('Order '+o.no+' placed on stock hold','err');refresh();return}
  o.allocs=[];o.lines.forEach(l=>{o.allocs.push(...allocate(l.item,l.qty,o.no))});
  o.status='Allocated';o.holdReason='';closeModal();toast('Inventory held for '+o.no+' (FEFO)');refresh();
}

/* ---- Cycle Count ---- */
PAGES.cyclecount=function(){
  const ccs=db.cycleCounts;
  const done=ccs.filter(c=>c.status==='Completed');
  const varOf=c=>c.lines.reduce((s,l)=>s+(l.counted-l.sys)*(item(l.item).cost||0),0);
  const totVar=done.reduce((s,c)=>s+varOf(c),0);
  const counted=done.reduce((s,c)=>s+c.lines.length,0);
  const totLines=ccs.reduce((s,c)=>s+(c.lines.length||db.inv.filter(r=>r.bin===c.bin&&r.qty>0).length),0);
  return pageHead('Cycle Count','Count bins against system stock. Completing a count auto-posts adjustments and writes the inventory ledger.','<button class="btn p" onclick="newCycleCount()">+ Start new count</button>')+
  '<div class="kpis">'+
  kpiIco(Math.round(counted/Math.max(1,totLines)*100)+'%','Overall progress','◔','#1d4ed8',counted+' / '+totLines+' lines')+
  kpiIco(ccs.filter(c=>c.status==='Pending').length,'Pending','⏳','#b45309')+
  kpiIco(done.length,'Completed','✅','#15803d')+
  kpiIco(fmt$(Math.abs(totVar)),'Net variance '+(totVar<0?'(shrink)':''),'±','#b91c1c')+
  '</div>'+
  '<div class="layout"><div><div class="card"><div class="card-h">Cycle count locations</div><div class="card-b" style="padding:0">'+
  table([{h:'#',k:'i'},{h:'Location',k:'l'},{h:'Zone',k:'z'},{h:'Status',k:'s'},{h:'Counted',k:'c'},{h:'Variance $',k:'v',num:true},{h:'Last counted',k:'d'},{h:'',k:'a'}],
   ccs.map((c,ix)=>{const rows=db.inv.filter(r=>r.bin===c.bin&&r.qty>0).length;const v=varOf(c);
    return {i:ix+1,l:'<b>'+bin(c.bin).code+'</b>',z:bin(c.bin).zone,s:sbadge(c.status==='Completed'?'Complete':c.status==='Pending'?'Draft':c.status),
    c:c.status==='Completed'?c.lines.length+' / '+c.lines.length+' (100%)':'0 / '+rows+' (0%)',
    v:c.status==='Completed'?'<span style="color:'+(v<0?'var(--red)':'var(--green)')+';font-weight:600">'+(v<0?'−':'+')+fmt$(Math.abs(v)).slice(1)+'</span>':'—',
    d:c.date?dstr(c.date)+'<div class="sub">by '+esc(userById(c.by).name.split(' (')[0])+'</div>':'—',
    a:c.status!=='Completed'?'<button class="btn sm p" onclick="runCount(\''+c.id+'\')">Start count</button>':'<button class="btn sm" onclick="viewCount(\''+c.id+'\')">View</button>'}}),'No counts scheduled — start one.')+'</div></div></div>'+
  '<div><div class="card"><div class="card-h">Variance summary</div><div class="card-b" style="font-size:12.5px">'+
   [['Total variance','<b style="color:'+(totVar<0?'var(--red)':'var(--green)')+'">'+(totVar<0?'−':'+')+fmt$(Math.abs(totVar)).slice(1)+'</b>'],
    ['Positive variance','+'+fmt$(done.reduce((s,c)=>s+c.lines.reduce((t,l)=>t+Math.max(0,(l.counted-l.sys))*(item(l.item).cost||0),0),0)).slice(1)],
    ['Negative variance','−'+fmt$(Math.abs(done.reduce((s,c)=>s+c.lines.reduce((t,l)=>t+Math.min(0,(l.counted-l.sys))*(item(l.item).cost||0),0),0))).slice(1)],
    ['Adjustments posted',db.adjustments.filter(a=>a.reason==='Cycle count').length]].map(r=>'<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eef1f4">'+r[0]+'<span>'+r[1]+'</span></div>').join('')+
  '</div></div>'+
  '<div class="card"><div class="card-h">💡 Tips</div><div class="card-b sub">Scan the location barcode to start counting. Count what you physically see — the system posts the +/− adjustment and full ledger entry automatically. Blind counts: system qty is hidden until you enter yours.</div></div></div></div>';
};
function newCycleCount(){
  openModal('Start New Count','<div class="fld"><label>Bin location</label><select id="cc-bin">'+selOpts(db.bins.filter(b=>wh(b.wh).type==='internal'),'id',b=>'LOC-'+b.code+' ('+b.zone+')')+'</select></div>',
  {saveLabel:'Create count',onSave:()=>{
    db.cycleCounts.unshift({id:uid('CC'),no:'CC-00'+(++db.counters.cc),bin:$('#cc-bin').value,status:'Pending',date:'',by:'',posted:false,lines:[]});
    closeModal();toast('Count created');refresh()}});
}
function runCount(id){
  const c=db.cycleCounts.find(x=>x.id===id);
  const rows=db.inv.filter(r=>r.bin===c.bin&&r.qty>0);
  if(!rows.length)return toast('Bin '+bin(c.bin).code+' is empty — nothing to count','err');
  openModal('Count '+bin(c.bin).code+' — enter physical quantities',
  '<div class="scanbox" style="margin-bottom:12px"><b>📍 '+bin(c.bin).code+'</b> · '+bin(c.bin).zone+' zone · scan each item and enter what you physically count.</div>'+
  rows.map((r,ix)=>'<div class="frow" style="align-items:end;border-bottom:1px solid var(--line);padding-bottom:8px">'+
   '<div class="fld"><label>Item</label><b>'+item(r.item).sku+'</b><div class="sub">lot '+lot(r.lot).lot+'</div></div>'+
   '<div class="fld"><label>System qty</label>'+r.qty+'</div>'+
   '<div class="fld"><label>Counted qty</label><input id="cc-q-'+ix+'" type="number" value="'+r.qty+'" min="0"></div></div>').join(''),
  {saveLabel:'✓ Complete count & post variances',wide:true,onSave:()=>{
    c.lines=rows.map((r,ix)=>({item:r.item,lot:r.lot,sys:r.qty,counted:+($('#cc-q-'+ix).value||0)}));
    let adj=0;
    c.lines.forEach(l=>{const d=l.counted-l.sys;if(!d)return;adj++;
      if(d>0)addStock(l.item,l.lot,c.bin,d,'ADJUST','CYCLE '+c.no,'Cycle count variance');
      else removeStock(l.item,l.lot,c.bin,-d,'ADJUST','CYCLE '+c.no,'Cycle count variance');
      db.adjustments.unshift({no:'ADJ-'+(++db.counters.adj),date:todayISO(),item:l.item,lot:l.lot,bin:c.bin,qty:d,reason:'Cycle count',by:curUser.id})});
    c.status='Completed';c.date=todayISO();c.by=curUser.id;c.posted=true;
    closeModal();toast('Count complete — '+adj+' variance adjustment'+(adj===1?'':'s')+' posted');refresh()}});
}
function viewCount(id){
  const c=db.cycleCounts.find(x=>x.id===id);
  openModal('Count '+c.no+' — '+bin(c.bin).code,
  table([{h:'Item',k:'i'},{h:'Lot',k:'l'},{h:'System',k:'s',num:true},{h:'Counted',k:'c',num:true},{h:'Variance',k:'v',num:true},{h:'$ impact',k:'d',num:true}],
   c.lines.map(l=>({i:item(l.item).sku,l:lot(l.lot).lot,s:l.sys,c:l.counted,v:(l.counted-l.sys>0?'+':'')+(l.counted-l.sys),d:fmt$((l.counted-l.sys)*(item(l.item).cost||0))})))+
  '<p class="sub" style="margin-top:8px">Counted by '+esc(userById(c.by).name)+' on '+dstr(c.date)+'. Variances posted as adjustments.</p>',{saveLabel:null});
}

}
function postReceipt(id){
  const p=db.pos.find(x=>x.id===id);let any=false,itemsTxt=[];
  p.lines.forEach((l,ix)=>{const q=+($('#rc-q-'+ix)?$('#rc-q-'+ix).value:0);if(!q)return;any=true;
    const lotNo=$('#rc-l-'+ix).value||'NA';const bb=$('#rc-b-'+ix).value;const binId=$('#rc-bin-'+ix).value;
    let lo=db.lots.find(x=>x.item===l.item&&x.lot===lotNo);
    if(!lo){lo={id:uid('L'),item:l.item,lot:lotNo,bestBy:bb};db.lots.push(lo)}
    addStock(l.item,lo.id,binId,q,'RECEIPT',p.no,'PO receipt');l.rcv=(l.rcv||0)+q;itemsTxt.push(item(l.item).sku+' ×'+q+' (lot '+lotNo+')')});
  if(!any)return toast('Enter quantities first','err');
  p.status=p.lines.every(l=>(l.rcv||0)>=l.qty)?'Received':'Partially Received';
  db.recvLogs.unshift({ts:nowTs(),ref:p.no,vendor:vend(p.vendor).name,items:itemsTxt.join(', '),by:curUser.id,temp:$('#rc-temp').value,condition:$('#rc-cond').value,coa:$('#rc-coa').value});
  toast('Receipt posted — inventory & receiving log updated');refresh();
}

PAGES.workorders=function(){
  return pageHead('Work Orders','Plan production. Releasing a WO checks BOM component availability; completing it happens on the Builds page (consume components → produce FG lot).','<button class="btn p" onclick="newWO()">+ New work order</button>')+

   db.workOrders.map(w=>{const chk=bomCheck(w.item,w.qty);
    return {no:'<b>'+w.no+'</b>',i:item(w.item).sku+'<div class="sub">'+esc(item(w.item).name)+'</div>',q:w.qty,r:w.run||'—',d:dstr(w.due),
    c:chk.ok?badge('All components OK','green'):badge('Short: '+chk.shorts.map(s=>s.sku).join(', '),'red'),s:sbadge(w.status),
    a:(w.status==='Planned'?'<button class="btn sm p" onclick="releaseWO(\''+w.id+'\')">Release</button> ':'')+
      (['Released','WIP'].includes(w.status)?'<button class="btn sm p" onclick="buildFromWO(\''+w.id+'\')">Build →</button>':'')}}))+'</div></div>';

function bomCheck(itemId,qty){
  const bom=db.boms[itemId]||[];const shorts=[];
  bom.forEach(c=>{if(available(c.item)<c.qty*qty)shorts.push({sku:item(c.item).sku,need:c.qty*qty,have:available(c.item)})});
  return {ok:bom.length>0&&!shorts.length,shorts,hasBom:bom.length>0};
}
function releaseWO(id){const w=db.workOrders.find(x=>x.id===id);const chk=bomCheck(w.item,w.qty);
  if(!chk.hasBom)return toast('No BOM defined for this item','err');
  if(!chk.ok)return toast('Cannot release — short components: '+chk.shorts.map(s=>s.sku+' need '+s.need+' have '+s.have).join('; '),'err');
  w.status='Released';toast(w.no+' released to floor');refresh()}
function newWO(pre){
  openModal('New Work Order','<div class="frow"><div class="fld"><label>Item to build (has BOM)</label><select id="wo-i">'+selOpts(db.items.filter(i=>db.boms[i.id]),'id',i=>i.sku+' — '+i.name,pre&&pre.item)+'</select></div><div class="fld"><label>Qty</label><input id="wo-q" type="number" value="'+(pre&&pre.qty||50)+'"></div><div class="fld"><label>Due</label><input id="wo-d" type="date" value="'+daysAgo(-7)+'"></div></div>',

}

function traceBuild(id){const b=db.builds.find(x=>x.id===id);
  openModal('Traceability — '+b.no,
  '<p style="margin-bottom:10px"><b>'+item(b.item).sku+'</b> lot <span class="mono">'+esc(b.lotOut)+'</span> ('+b.qty+' '+item(b.item).uom+') was produced on '+dstr(b.date)+' by '+esc(userById(b.by).name)+' consuming:</p>'+

  '<p style="margin-top:10px;font-size:12px;color:var(--muted)">Forward trace: search lot '+esc(b.lotOut)+' in Lots/Barcode Search to see which orders & shipments consumed this lot.</p>',{saveLabel:null,wide:true});
}
function buildFromWO(woId){
  const wos=db.workOrders.filter(w=>['Released','WIP'].includes(w.status));
  if(!wos.length&&!woId)return toast('No released work orders. Create & release one first.','err');
  const w=woId?db.workOrders.find(x=>x.id===woId):wos[0];
  if(w&&w.status==='Planned')return toast('Release the WO first','err');
  const chk=bomCheck(w.item,w.qty);
  const bom=db.boms[w.item]||[];
  openModal('Post Build — '+w.no,
  '<div class="frow"><div class="fld"><label>Output</label><b>'+item(w.item).sku+'</b> '+esc(item(w.item).name)+'</div><div class="fld"><label>Qty built</label><input id="bl-q" type="number" value="'+w.qty+'" max="'+w.qty+'"></div>'+
  '<div class="fld"><label>New FG lot #</label><input id="bl-lot" type="text" value="'+(25200+Math.floor(Math.random()*90))+'"></div><div class="fld"><label>Best by</label><input id="bl-bb" type="date" value="'+daysAgo(-540)+'"></div></div>'+
  (chk.ok?'':'<div class="notice">⚠ Component shortage — build will fail unless quantity reduced.</div>')+
  '<div class="card"><div class="card-h">Components to consume (FEFO lots)</div><div class="card-b" style="padding:0">'+
  table([{h:'Component',k:'c'},{h:'Per unit',k:'p',num:true},{h:'Total need',k:'t',num:true},{h:'Available',k:'a',num:true}],
   bom.map(c=>({c:item(c.item).sku,p:c.qty,t:+(c.qty*w.qty).toFixed(2),a:available(c.item)})))+'</div></div>',
  {saveLabel:'⚒ Post build',wide:true,onSave:()=>{
    const q=+$('#bl-q').value;const lotNo=$('#bl-lot').value;
    const comps=[];
    for(const c of bom){let need=+(c.qty*q).toFixed(4);
      const rows=invRows(c.item).sort((a,b2)=>(lot(a.lot).bestBy||'9999')<(lot(b2.lot).bestBy||'9999')?-1:1);
      const av=rows.reduce((s,r)=>s+r.qty-r.alloc,0);if(av<need)return toast('Short '+item(c.item).sku+' — need '+need+', have '+av,'err');
      for(const r of rows){const t=Math.min(r.qty-r.alloc,need);if(t>0){removeStock(c.item,r.lot,r.bin,t,'BUILD-CONSUME',w.no,'Consumed in build');comps.push({item:c.item,lot:lot(r.lot).lot,qty:+t.toFixed(2)});need-=t}if(need<=0)break}}
    let lo=db.lots.find(x=>x.item===w.item&&x.lot===lotNo);
    if(!lo){lo={id:uid('L'),item:w.item,lot:lotNo,bestBy:$('#bl-bb').value};db.lots.push(lo)}
    addStock(w.item,lo.id,'BIN12',q,'BUILD-OUTPUT',w.no,'Produced');
    const b={id:uid('BLD'),no:'BLD-0'+(++db.counters.bld),wo:w.no,item:w.item,qty:q,lotOut:lotNo,date:todayISO(),by:curUser.id,status:'Complete',components:comps};
    db.builds.unshift(b);
    w.status=q>=w.qty?'Done':'WIP';if(q<w.qty)w.qty-=q;
    closeModal();toast('Build posted: +'+q+' '+item(w.item).sku+' lot '+lotNo+' · components consumed');refresh()}});
}

function newJob(){
  openModal('Submit Production Job','<div class="frow"><div class="fld"><label>Item produced</label><select id="jb-i">'+selOpts(db.items.filter(i=>['FG','KIT'].includes(i.type)),'id',i=>i.sku+' — '+i.name)+'</select></div><div class="fld"><label>Qty</label><input id="jb-q" type="number" value="20"></div></div>'+

  {saveLabel:'Submit for approval',onSave:()=>{
    db.jobs.unshift({id:uid('JOB'),no:'JT-00'+(++db.counters.job),by:curUser.id,date:todayISO(),item:$('#jb-i').value,qty:+$('#jb-q').value,lot:$('#jb-l').value,shift:$('#jb-s').value,machine:$('#jb-m').value,notes:$('#jb-n').value,status:'Pending Approval'});
    closeModal();toast('Job submitted — awaiting admin approval');refresh()}});
}
function approveJob(id){const j=db.jobs.find(x=>x.id===id);
  const bom=db.boms[j.item]||[];const comps=[];
  for(const c of bom){let need=+(c.qty*j.qty).toFixed(4);
    const rows=invRows(c.item).sort((a,b)=>(lot(a.lot).bestBy||'9999')<(lot(b.lot).bestBy||'9999')?-1:1);
    const av=rows.reduce((s,r)=>s+r.qty-r.alloc,0);
    if(av<need){toast('Approved with warning: component '+item(c.item).sku+' short — consumption skipped (adjust later)','err');need=0;continue}
    for(const r of rows){const t=Math.min(r.qty-r.alloc,need);if(t>0){removeStock(c.item,r.lot,r.bin,t,'BUILD-CONSUME',j.no,'Job approval consumption');comps.push({item:c.item,lot:lot(r.lot).lot,qty:+t.toFixed(2)});need-=t}if(need<=0)break}}
  let lo=db.lots.find(x=>x.item===j.item&&x.lot===j.lot);
  if(!lo){lo={id:uid('L'),item:j.item,lot:j.lot,bestBy:daysAgo(-540)};db.lots.push(lo)}
  addStock(j.item,lo.id,'BIN12',j.qty,'BUILD-OUTPUT',j.no,'From approved job');
  db.builds.unshift({id:uid('BLD'),no:'BLD-0'+(++db.counters.bld),wo:j.no,item:j.item,qty:j.qty,lotOut:j.lot,date:j.date,by:j.by,status:'Complete',components:comps});
  j.status='Approved';j.approvedBy=curUser.id;j.approvedAt=nowTs();
  toast(j.no+' approved → Build posted, +'+j.qty+' '+item(j.item).sku+' into inventory');refresh();
}

  '<div id="lotres" style="margin-top:14px">'+lotTable(db.inv.filter(r=>r.qty>0))+'</div>';

function lotTable(rows){
  return '<div class="card"><div class="card-h">Stock by lot & location ('+rows.length+' rows)</div><div class="card-b" style="padding:0">'+
  table([{h:'SKU',k:'s'},{h:'Item',k:'n'},{h:'Lot',k:'l'},{h:'Best by',k:'bb'},{h:'Warehouse',k:'w'},{h:'Bin',k:'b'},{h:'Qty',k:'q',num:true},{h:'Held',k:'a',num:true}],
   rows.map(r=>{const bb=lot(r.lot).bestBy;const soon=bb&&bb<daysAgo(-60);
    return {s:'<b>'+item(r.item).sku+'</b>',n:esc(item(r.item).name),l:'<span class="mono">'+esc(lot(r.lot).lot)+'</span>',
    bb:bb?(soon?'<span style="color:var(--amber);font-weight:600">'+dstr(bb)+' ⚠</span>':dstr(bb)):'—',
    w:wh(bin(r.bin).wh).code,b:bin(r.bin).code,q:r.qty.toLocaleString(),a:r.alloc||0}}),'No stock found')+'</div></div>';
}
function lotSearchRun(){
  const q=$('#lotsearch').value.trim().toLowerCase().replace(/^lot-/,'').replace(/^loc-/,'');
  const rows=db.inv.filter(r=>r.qty>0&&(item(r.item).sku.toLowerCase().includes(q)||String(item(r.item).upc).toLowerCase()===q||lot(r.lot).lot.toLowerCase().includes(q)||bin(r.bin).code.toLowerCase().includes(q)));
  let extra='';
  const lo=db.lots.find(l=>l.lot.toLowerCase()===q);
  if(lo){const b=db.builds.find(x=>x.lotOut===lo.lot&&x.item===lo.item);
    const consumed=db.builds.filter(x=>x.components.some(c=>c.lot===lo.lot));
    const shipped=db.ledger.filter(l=>l.lot===lo.id&&l.type==='SHIP');
    extra='<div class="card"><div class="card-h">🧬 Lot genealogy — '+esc(lo.lot)+'</div><div class="card-b">'+
    (b?'<p>⚒ Produced by <b>'+b.no+'</b> on '+dstr(b.date)+' from '+b.components.length+' component lots ('+b.components.map(c=>item(c.item).sku+':'+c.lot).join(', ')+')</p>':'<p>📥 Received via purchase (no build record).</p>')+
    (consumed.length?'<p>➡ Consumed by builds: '+consumed.map(c=>c.no+' → '+item(c.item).sku+' lot '+c.lotOut).join('; ')+'</p>':'')+
    (shipped.length?'<p>🚚 Shipped on orders: '+shipped.map(s=>esc(s.ref)).join(', ')+'</p>':'')+
    '</div></div>'}
  $('#lotres').innerHTML=extra+lotTable(rows);
}

function newAdj(){
  const rows=db.inv.filter(r=>r.qty>0);
  openModal('Inventory Adjustment',
  '<div class="fld" style="margin-bottom:10px"><label>Stock row (item · lot · bin)</label><select id="aj-row">'+rows.map((r,ix)=>'<option value="'+ix+'">'+item(r.item).sku+' · lot '+lot(r.lot).lot+' · '+bin(r.bin).code+' · qty '+r.qty+'</option>').join('')+'</select></div>'+

  {saveLabel:'Post adjustment',onSave:()=>{
    const r=rows[+$('#aj-row').value];const q=+$('#aj-q').value;if(!q)return toast('Qty required','err');

    db.adjustments.unshift({no:'ADJ-'+(++db.counters.adj),date:todayISO(),item:r.item,lot:r.lot,bin:r.bin,qty:q,reason:$('#aj-r').value,by:curUser.id});

function newTransfer(){
  const rows=db.inv.filter(r=>r.qty-r.alloc>0);
  openModal('Transfer Stock',
  '<div class="fld" style="margin-bottom:10px"><label>Scan source (item · lot · bin)</label><select id="tr-row">'+rows.map((r,ix)=>'<option value="'+ix+'">'+item(r.item).sku+' · lot '+lot(r.lot).lot+' · '+bin(r.bin).code+' · free '+(r.qty-r.alloc)+'</option>').join('')+'</select></div>'+
  '<div class="frow"><div class="fld"><label>Qty</label><input id="tr-q" type="number" value="1"></div><div class="fld"><label>Scan destination bin</label><select id="tr-to">'+selOpts(db.bins,'id',b=>'LOC-'+b.code+' — '+wh(b.wh).code)+'</select></div></div>',
  {saveLabel:'Move stock',onSave:()=>{
    const r=rows[+$('#tr-row').value];const q=+$('#tr-q').value;const to=$('#tr-to').value;
    if(q<=0||q>r.qty-r.alloc)return toast('Invalid qty (free: '+(r.qty-r.alloc)+')','err');
    if(to===r.bin)return toast('Destination = source','err');
    const no='TR-'+(++db.counters.tr);
    removeStock(r.item,r.lot,r.bin,q,'TRANSFER-OUT',no,'');addStock(r.item,r.lot,to,q,'TRANSFER-IN',no,'');
    db.transfers.unshift({no,date:todayISO(),item:r.item,lot:r.lot,from:r.bin,to,qty:q,by:curUser.id});
    closeModal();toast('Transfer '+no+' posted');refresh()}});
}

function genLabel(kind){
  let code,txt;

  if(kind==='lot'){const l=db.lots.find(x=>x.id===$('#lb-lot').value);code='LOT-'+l.lot;txt=item(l.item).sku+' · Best by '+(l.bestBy?dstr(l.bestBy):'N/A')}
  if(kind==='bin'){const b=db.bins.find(x=>x.id===$('#lb-bin').value);code='LOC-'+b.code;txt=wh(b.wh).name+' · '+b.zone}
  $('#lb-out').innerHTML+='<div style="text-align:center">'+barcode(code)+'<div class="sub" style="max-width:170px">'+esc(txt)+'</div></div>';
  toast('Label rendered — sent to print queue 🖨');

  return pageHead('Picklists','Wave-pick allocated orders. Each line tells the picker the bin & lot (FEFO). Scan bin ▸ scan item ▸ confirm qty.',
   ready.length?'<button class="btn p" onclick="makeWave()">⚡ Create wave from '+ready.length+' allocated order'+(ready.length>1?'s':'')+'</button>':'')+
  db.picklists.map(pl=>{
    const lines=pl.lines;const done=lines.filter(l=>l.picked).length;
    return '<div class="card"><div class="card-h">'+pl.no+' · '+pl.orders.length+' order(s) · assigned '+esc(userById(pl.assignedTo).name.split(' (')[0])+' '+sbadge(pl.status)+'<div class="spacer"></div>'+Math.round(done/lines.length*100)+'% picked</div><div class="card-b" style="padding:0">'+
    table([{h:'Pick',k:'p'},{h:'Bin ▸',k:'b'},{h:'SKU',k:'s'},{h:'Lot',k:'l'},{h:'Qty',k:'q',num:true},{h:'For order',k:'o'}],
     lines.map((l,ix)=>({p:l.picked?'<span class="b green">✓ picked</span>':(pl.status!=='Done'?'<button class="btn sm p" onclick="scanPick(\''+pl.id+'\','+ix+')">📷 Scan pick</button>':'—'),
      b:'<b>'+bin(l.bin).code+'</b>',s:item(l.item).sku,l:'<span class="mono">'+lot(l.lot).lot+'</span>',q:l.qty,o:esc(l.order)})))+'</div></div>'}).join('')||'<div class="empty card" style="padding:30px">No picklists. Allocate orders then create a wave.</div>';
};
function makeWave(){
  const ready=db.orders.filter(o=>o.status==='Allocated');if(!ready.length)return;
  const lines=[];ready.forEach(o=>{o.allocs.forEach(a=>lines.push({order:o.no,orderId:o.id,item:a.item,lot:a.lot,bin:a.bin,qty:a.qty,picked:false}))});
  lines.sort((a,b)=>bin(a.bin).code<bin(b.bin).code?-1:1);
  const pl={id:uid('PL'),no:'PICK-'+(++db.counters.pick),orders:ready.map(o=>o.id),lines,status:'Open',assignedTo:curUser.role==='employee'?curUser.id:'U2',date:todayISO()};
  db.picklists.unshift(pl);ready.forEach(o=>o.status='Picking');
  toast('Wave '+pl.no+' created — '+lines.length+' pick lines, sorted by bin path');refresh();
}
function makePicklist(orderId){const o=db.orders.find(x=>x.id===orderId);
  const lines=o.allocs.map(a=>({order:o.no,orderId:o.id,item:a.item,lot:a.lot,bin:a.bin,qty:a.qty,picked:false})).sort((a,b)=>bin(a.bin).code<bin(b.bin).code?-1:1);
  const pl={id:uid('PL'),no:'PICK-'+(++db.counters.pick),orders:[o.id],lines,status:'Open',assignedTo:curUser.role==='employee'?curUser.id:'U2',date:todayISO()};
  db.picklists.unshift(pl);o.status='Picking';closeModal();toast('Picklist '+pl.no+' created');location.hash.includes('orderdetail')?refresh():go('picklist')}
function doPick(pl,ix,sb,si,q){
  const l=pl.lines[ix];
  sb=String(sb||'').trim().toUpperCase().replace(/^LOC-/,'');si=String(si||'').trim().toUpperCase().replace(/^LOT-/,'');
  if(sb!==bin(l.bin).code.toUpperCase())return 'Wrong bin: scanned "'+(sb||'(empty)')+'" — expected '+bin(l.bin).code;
  if(si!==item(l.item).sku.toUpperCase()&&si!==lot(l.lot).lot.toUpperCase()&&si!==String(item(l.item).upc))return 'Wrong item: scanned "'+(si||'(empty)')+'" — expected '+item(l.item).sku;
  if(+q!==l.qty)return 'Qty mismatch — expected '+l.qty;
  const r=db.inv.find(x=>x.item===l.item&&x.lot===l.lot&&x.bin===l.bin);
  if(r){r.alloc=Math.max(0,r.alloc-l.qty);removeStock(l.item,l.lot,l.bin,l.qty,'PICK',l.order,'Picked to pack station');addStock(l.item,l.lot,'BIN9',l.qty,'PICK-STAGE',l.order,'At pack station')}
  l.picked=true;l.pickedBy=curUser.id;l.pickedAt=nowTs();
  if(pl.lines.every(x=>x.picked))pl.status='Done';
  pl.orders.forEach(oid=>{const o=db.orders.find(x=>x.id===oid);const mine=pl.lines.filter(x=>x.orderId===oid);
    if(o&&o.status==='Picking'&&mine.length&&mine.every(x=>x.picked)){o.status='Picked';toast(o.no+' fully picked — ready to pack')}});
  return null;
}
function scanPick(plId,ix){
  const pl=db.picklists.find(x=>x.id===plId);const l=pl.lines[ix];
  openModal('Scan Pick — '+item(l.item).sku,
  '<div class="scanbox"><div class="fld"><label>Step 1 — scan bin location</label><input id="sp-bin" type="text" placeholder="Expected: LOC-'+bin(l.bin).code+'" onkeydown="if(event.key===\'Enter\')$(\'#sp-item\').focus()"></div>'+
  '<div class="fld" style="margin-top:8px"><label>Step 2 — scan item / lot barcode</label><input id="sp-item" type="text" placeholder="Expected: '+item(l.item).sku+' or LOT-'+lot(l.lot).lot+'"></div>'+
  '<div class="fld" style="margin-top:8px"><label>Qty</label><input id="sp-q" type="number" value="'+l.qty+'"></div>'+
  '<div class="scan-log" id="sp-log">› Scanner ready…</div></div>',
  {saveLabel:'Confirm pick',onSave:()=>{
    const err=doPick(pl,ix,$('#sp-bin').value,$('#sp-item').value,$('#sp-q').value);
    if(err){$('#sp-log').innerHTML+='<div class="bad">✗ '+esc(err)+'</div>';return}
    if(pl.status==='Done')toast(pl.no+' complete');else toast('Pick confirmed ✓');
    closeModal();refresh()}});
}

  picked.map(o=>'<div class="card"><div class="card-h">'+esc(o.no)+' — '+esc(o.shipTo.name)+' ('+esc(o.shipTo.city)+', '+esc(o.shipTo.st)+') '+sbadge(o.status)+'</div><div class="card-b">'+
   '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">'+o.lines.map(l=>'<span class="tag">'+l.qty+'× '+item(l.item).sku+'</span>').join('')+'</div>'+
   (o.status==='Picked'?'<div class="frow"><div class="fld"><label>Verify scan (type SKUs, comma-sep)</label><input id="pk-scan-'+o.id+'" type="text" placeholder="'+o.lines.map(l=>item(l.item).sku).join(', ')+'"></div>'+
    '<div class="fld"><label>Box</label><select id="pk-box-'+o.id+'"><option>8 x 6 x 4</option><option>9 x 7 x 5</option><option>12 x 10 x 6</option><option>Pallet (LTL)</option></select></div>'+
    '<div class="fld"><label>Weight (lb)</label><input id="pk-w-'+o.id+'" type="number" value="'+Math.max(1,o.lines.reduce((s,l)=>s+l.qty,0))+'"></div></div>'+
    '<button class="btn p" onclick="packOrder(\''+o.id+'\')">📦 Pack carton</button>':
    '<button class="btn p" onclick="shipOrder(\''+o.id+'\')">🏷 Buy label & ship</button> <span class="sub">Rate-shops USPS / UPS / FedEx via EasyPost</span>')+
   '</div></div>').join('');
};
function packOrder(id){
  const o=db.orders.find(x=>x.id===id);
  const scan=($('#pk-scan-'+id).value||'').toUpperCase().split(',').map(s=>s.trim()).filter(Boolean);
  const need=o.lines.map(l=>item(l.item).sku.toUpperCase());
  const missing=need.filter(s=>!scan.includes(s));
  if(missing.length)return toast('Verify scan failed — missing: '+missing.join(', '),'err');
  o.box=$('#pk-box-'+id).value;o.weight=+$('#pk-w-'+id).value;o.pkgCount=+(($('#pk-ct-'+id)||{}).value||1);o.status='Packed';
  toast(o.no+' packed in '+o.box+' — ready for label');refresh();
}
function shipOrder(id){
  const o=db.orders.find(x=>x.id===id);
  const rates=[{c:'USPS',s:'Ground Advantage',p:6.26+Math.random()*2},{c:'UPS',s:'UPS® Ground',p:7.74+Math.random()*2},{c:'FedEx',s:'Home Delivery',p:8.1+Math.random()*2}].sort((a,b)=>a.p-b.p);
  openModal('Buy Label — '+o.no,
  '<p style="margin-bottom:10px">EasyPost returned '+rates.length+' rates (cheapest preselected):</p>'+
  rates.map((r,ix)=>'<label style="display:flex;gap:10px;align-items:center;padding:8px;border:1.5px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer"><input type="radio" name="rate" value="'+ix+'" '+(ix===0?'checked':'')+'> <b>'+r.c+'</b> '+r.s+'<span style="margin-left:auto;font-weight:700">'+fmt$(r.p)+'</span></label>').join(''),
  {saveLabel:'Purchase label & ship',onSave:()=>{
    const r=rates[+document.querySelector('input[name=rate]:checked').value];
    const trk=r.c==='USPS'?'93'+Math.floor(Math.random()*1e18):r.c==='UPS'?'1ZK1076C0'+Math.floor(Math.random()*1e9):'7'+Math.floor(Math.random()*1e11);
    // consume packed stock from pack station
    o.lines.forEach(l=>{let need=l.qty;const rows=db.inv.filter(x=>x.item===l.item&&x.bin==='BIN9'&&x.qty>0);
      for(const row of rows){const t=Math.min(row.qty,need);if(t>0){removeStock(l.item,row.lot,row.bin,t,'SHIP',o.no,'Shipped '+r.c);need-=t}if(!need)break}
      if(need>0){const rows2=invRows(l.item);for(const row of rows2){const t=Math.min(row.qty,need);if(t>0){row.alloc=Math.max(0,row.alloc-t);removeStock(l.item,row.lot,row.bin,t,'SHIP',o.no,'Shipped '+r.c);need-=t}if(!need)break}}});
    o.status='Shipped';o.tracking=String(trk);o.carrier=r.c;o.service=r.s;o.shipDate=todayISO();o.cost=+r.p.toFixed(2);o.allocs=[];
    db.shipments.unshift({id:uid('SHP'),order:o.id,no:'SHP-'+(++db.counters.ship),date:todayISO(),carrier:r.c,service:r.s,tracking:String(trk),cost:+r.p.toFixed(2),status:'Label Created',step:0,events:[{ts:nowTs(),desc:'Label created — '+r.c+' '+r.s}],label:'Active'});
    db.shipLogs.unshift({ts:nowTs(),order:o.no,carrier:r.c,tracking:String(trk),by:curUser.id,pallets:0,cartons:1});
    // auto-invoice
    const c=cust(o.cust);const isD2C=['Amazon','Shopify','TikTok'].includes(o.channel);
    const lines=o.lines.map(l=>({desc:item(l.item).sku+' — '+item(l.item).name,qty:l.qty,price:item(l.item).price||0}));
    if(isD2C){const units=o.lines.reduce((s,l)=>s+l.qty,0);lines.push({desc:'3PL Pick & Pack fee',qty:units,price:units>=40?0.09:0.25});lines.push({desc:'Postage — '+r.c+' '+r.s,qty:1,price:+r.p.toFixed(2)})}
    const total=+lines.reduce((s,l)=>s+l.qty*l.price,0).toFixed(2);
    db.invoices.unshift({id:uid('INV'),no:'INV-'+(++db.counters.inv),cust:o.cust,date:todayISO(),due:daysAgo(-30),ref:o.no,status:'Unpaid',lines,total});
    if(c.edi){db.ediDocs.unshift({ts:nowTs(),partner:c.name,doc:'856 ASN',ref:o.poNo||o.no,dir:'OUT',status:'Sent — pallet SSCC included'});db.ediDocs.unshift({ts:nowTs(),partner:c.name,doc:'810 Invoice',ref:o.poNo||o.no,dir:'OUT',status:'Sent'})}
    closeModal();toast('🚚 '+o.no+' shipped '+r.c+' '+String(trk).slice(0,14)+'… — invoice auto-created'+(c.edi?' + EDI 856/810 sent':''));refresh()}});
}

PAGES.kitting=function(){
  const kits=db.items.filter(i=>i.type==='KIT');
  return pageHead('Kitting','Pre-build kits/bundles (e.g. TikTok Sampler Pack) from component units so channel orders ship as one scan.')+

  '<button class="btn p" onclick="assembleKit()">🎁 Assemble</button></div></div>'+
  '<div class="card"><div class="card-h">Kit BOMs</div><div class="card-b" style="padding:0">'+
  table([{h:'Kit',k:'k'},{h:'Components',k:'c'},{h:'Kits on hand',k:'oh',num:true},{h:'Max assemblable now',k:'mx',num:true}],
   kits.map(k=>{const bom=db.boms[k.id]||[];const mx=bom.length?Math.min(...bom.map(c=>Math.floor(available(c.item)/c.qty))):0;
    return {k:'<b>'+k.sku+'</b>',c:bom.map(c=>c.qty+'× '+item(c.item).sku).join(', ')||'—',oh:onHand(k.id),mx}}))+'</div></div>';
};
function assembleKit(){
  const kid=$('#kt-i').value,q=+$('#kt-q').value;const bom=db.boms[kid]||[];
  if(!bom.length)return toast('Kit has no BOM','err');
  for(const c of bom){if(available(c.item)<c.qty*q)return toast('Short '+item(c.item).sku,'err')}
  const comps=[];
  bom.forEach(c=>{let need=c.qty*q;for(const r of invRows(c.item)){const t=Math.min(r.qty-r.alloc,need);if(t>0){removeStock(c.item,r.lot,r.bin,t,'KIT-CONSUME','KIT','Kitting');comps.push({item:c.item,lot:lot(r.lot).lot,qty:t});need-=t}if(!need)break}});
  let lo=db.lots.find(x=>x.item===kid&&x.lot==='KIT-'+todayISO());
  if(!lo){lo={id:uid('L'),item:kid,lot:'KIT-'+todayISO(),bestBy:daysAgo(-365)};db.lots.push(lo)}
  addStock(kid,lo.id,'BIN2',q,'KIT-OUTPUT','KIT','Assembled');
  db.builds.unshift({id:uid('BLD'),no:'BLD-0'+(++db.counters.bld),wo:'Kitting',item:kid,qty:q,lotOut:lo.lot,date:todayISO(),by:curUser.id,status:'Complete',components:comps});
  toast(q+' kits assembled → pick face');refresh();
}

let shpFilter={st:'',q:'',car:''};

  const today=todayISO();
  let list=db.shipments;
  if(shpFilter.st==='Ready to Ship')list=[];
  else if(shpFilter.st==='Out for Delivery')list=list.filter(s=>s.status==='In Transit'&&(s.step||0)>=3);
  else if(shpFilter.st)list=list.filter(s=>s.status===shpFilter.st);
  if(shpFilter.car)list=list.filter(s=>s.carrier===shpFilter.car);
  if(shpFilter.q){const q=shpFilter.q.toLowerCase();list=list.filter(s=>{const o=db.orders.find(x=>x.id===s.order)||{};return s.tracking.toLowerCase().includes(q)||s.no.toLowerCase().includes(q)||(o.no||'').toLowerCase().includes(q)||((o.shipTo||{}).name||'').toLowerCase().includes(q)})}
  const ready=db.orders.filter(o=>o.status==='Packed').length;
  const ofd=db.shipments.filter(s=>s.status==='In Transit'&&(s.step||0)>=3).length;
  const cnt=st=>db.shipments.filter(s=>s.status===st).length;
  const carriers=[...new Set(db.shipments.map(s=>s.carrier))];
  const carColors={UPS:'#b45309',USPS:'#1d4ed8',FedEx:'#7e22ce',DHL:'#b91c1c'};
  const shippedToday=db.shipments.filter(s=>s.date===today).length;
  const pendToday=db.orders.filter(o=>o.date===today&&o.status!=='Shipped').length;
  const totCost=db.shipments.filter(s=>s.label==='Active').reduce((s2,s)=>s2+(s.cost||0),0);
  return pageHead('Shipments','Track every parcel & pallet. '+shippedToday+' shipped today · '+pendToday+' still pending from today\'s orders. Carrier webhooks (EasyPost) update status live.',
   '<button class="btn" onclick="advanceTracking()">↻ Poll carrier tracking</button>')+
  '<div class="kpis">'+
  kpiIco(ready,'Ready to Ship','📦','#1d4ed8','',"go('fulfillment')")+
  kpiIco(cnt('In Transit'),'In Transit','🚚','#b45309','',"shpFilter.st=shpFilter.st==='In Transit'?'':'In Transit';refresh()",shpFilter.st==='In Transit')+
  kpiIco(ofd,'Out for Delivery','🛻','#7e22ce','',"shpFilter.st=shpFilter.st==='Out for Delivery'?'':'Out for Delivery';refresh()",shpFilter.st==='Out for Delivery')+
  kpiIco(cnt('Delivered'),'Delivered','✅','#15803d','',"shpFilter.st=shpFilter.st==='Delivered'?'':'Delivered';refresh()",shpFilter.st==='Delivered')+
  kpiIco(cnt('Exception'),'Exception','⚠','#b91c1c','',"shpFilter.st=shpFilter.st==='Exception'?'':'Exception';refresh()",shpFilter.st==='Exception')+
  '</div>'+
  '<div class="filters"><input type="text" placeholder="Search shipment #, order #, tracking #, customer…" value="'+esc(shpFilter.q)+'" onkeydown="if(event.key===\'Enter\'){shpFilter.q=this.value;refresh()}">'+
  '<select onchange="shpFilter.car=this.value;refresh()"><option value="">All carriers</option>'+carriers.map(c=>'<option '+(shpFilter.car===c?'selected':'')+'>'+c+'</option>').join('')+'</select>'+
  (shpFilter.st||shpFilter.q||shpFilter.car?'<button class="btn sm" onclick="shpFilter={st:\'\',q:\'\',car:\'\'};refresh()">✕ Clear</button>':'')+'</div>'+
  '<div class="layout"><div><div class="card"><div class="card-h">Shipments ('+list.length+')</div><div class="card-b" style="padding:0">'+
  table([{h:'Ship #',k:'no'},{h:'Order / customer',k:'o'},{h:'Carrier',k:'c'},{h:'Tracking #',k:'t'},{h:'Ship date',k:'d'},{h:'Delivered',k:'dd'},{h:'Cost',k:'$',num:true},{h:'Status',k:'s'},{h:'',k:'a'}],

    return {no:'<b>'+s.no+'</b>',o:esc(o.no||'—')+'<div class="sub">'+esc(o.shipTo?o.shipTo.name:'')+'</div>',

    t:'<span class="mono">'+esc(s.tracking)+'</span><span class="copyb" onclick="copyTrack(\''+esc(s.tracking)+'\')" title="Copy">⧉</span>',
    d:dstr(s.date),dd:o.deliveredDate?dstr(o.deliveredDate):(s.status==='Delivered'?dstr(today):'—'),'$':fmt$(s.cost),
    s:badge(s.label==='Voided'?'Voided':(s.status==='In Transit'&&(s.step||0)>=3?'Out for Delivery':s.status),s.label==='Voided'?'gray':{'Label Created':'gray','In Transit':'blue','Delivered':'green','Exception':'red'}[s.status]||'gray'),

   '<button class="btn qact" onclick="toast(\'End-of-day manifest (SCAN form) generated ✓\')">📄 Print manifest</button>'+
   '<button class="btn qact" onclick="toast(\'Shipments exported to CSV ✓\')">⬇ Export shipments</button>'+
  '</div></div></div></div>';
};
function advanceTracking(){
  let n=0;
  db.shipments.forEach(s=>{
    if(s.label==='Voided'||s.status==='Delivered')return;
    s.events=s.events||[{ts:s.date+'T09:00:00',desc:'Label created — '+s.carrier}];
    s.step=(s.step||0)+1;n++;
    const seq=['Picked up by '+s.carrier+' — origin scan','In transit — departed regional hub','Out for delivery','Delivered — left at front door'];
    s.events.push({ts:nowTs(),desc:seq[Math.min(s.step-1,3)]});
    s.status=s.step>=4?'Delivered':'In Transit';
    if(s.status==='Delivered'){const o=db.orders.find(x=>x.id===s.order);if(o)o.deliveredDate=todayISO()}
  });
  toast('Carrier webhooks processed — '+n+' tracking update'+(n===1?'':'s'));refresh();
}
function voidLabel(id){const s=db.shipments.find(x=>x.id===id);s.label='Voided';s.status='Exception';toast('Label voided — refund requested from carrier');refresh()}

let taskDate=null;
PAGES.tasks=function(){
  const date=taskDate||todayISO();
  if(!db.taskRuns[date])db.taskRuns[date]={};
  const applicable=db.checklists.filter(c=>curBrand==='ALL'||c.brand==='ALL'||c.brand===curBrand);
  const dates=Object.keys(db.taskRuns).sort().reverse();
  return pageHead('Daily Operations Checklist','Compliance checklists with date-by-date history. Every check-off records who did it and when. Build custom checklists per customer in the Checklist Builder.')+
  '<div class="filters"><div class="fld"><label>Date</label><input type="date" value="'+date+'" onchange="taskDate=this.value;refresh()"></div>'+
  '<div class="fld"><label>History</label><select onchange="taskDate=this.value;refresh()"><option value="">Jump to date…</option>'+dates.map(d=>'<option value="'+d+'"'+(d===date?' selected':'')+'>'+dstr(d)+' — '+histSummary(d)+'</option>').join('')+'</select></div></div>'+
  applicable.map(cl=>{
    const run=db.taskRuns[date][cl.id]||cl.items.map(()=>null);
    const done=run.filter(x=>x&&x.done).length;
    return '<div class="card"><div class="card-h">'+esc(cl.name)+' <span class="tag">'+cl.freq+'</span><span class="tag">'+(cl.brand==='ALL'?'All brands':db.brands.find(b=>b.id===cl.brand).name)+'</span><div class="spacer"></div>'+done+'/'+cl.items.length+' '+progress(done/cl.items.length*100)+'</div><div class="card-b">'+
    cl.items.map((it,ix)=>{const st=run[ix];
      return '<div class="chk-item'+(st&&st.done?' done':'')+'"><input type="checkbox" '+(st&&st.done?'checked':'')+' '+(isBrand()?'disabled':'')+' onchange="checkTask(\''+date+'\',\''+cl.id+'\','+ix+',this.checked)"><span class="txt">'+esc(it)+'</span>'+
      (st&&st.done?'<span class="who">✓ '+esc(userById(st.by).name.split(' (')[0])+' · '+tstr(st.at)+'</span>':'<span class="who">—</span>')+'</div>'}).join('')+
    '</div></div>'}).join('');
};
function histSummary(d){const runs=db.taskRuns[d];let done=0,tot=0;Object.entries(runs).forEach(([cid,run])=>{const cl=db.checklists.find(c=>c.id===cid);if(!cl)return;tot+=cl.items.length;done+=run.filter(x=>x&&x.done).length});return done+'/'+tot+' done'}
function checkTask(date,clId,ix,val){
  const cl=db.checklists.find(c=>c.id===clId);
  if(!db.taskRuns[date])db.taskRuns[date]={};
  if(!db.taskRuns[date][clId])db.taskRuns[date][clId]=cl.items.map(()=>null);
  db.taskRuns[date][clId][ix]=val?{done:true,by:curUser.id,at:nowTs()}:null;
  save();refresh();
}
